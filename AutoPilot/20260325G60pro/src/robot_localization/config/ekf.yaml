ekf_filter:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true

    # 里程计输入
    odom0: /odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   true, true, false]
    odom0_queue_size: 10

    # IMU 输入
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  true, true, true]
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true

    # 输出
    publish_tf: true
    publish_acceleration: false
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom