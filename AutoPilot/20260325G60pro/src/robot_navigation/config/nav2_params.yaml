amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: base_link
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_percentage: 0.9
    do_beamskip: false
    global_frame_id: map
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: likelihood_field
    max_beams: 60
    max_particles: 5000
    min_particles: 500
    odom_frame_id: odom
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: differential
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.65
    z_rand: 0.05
    z_short: 0.0

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    default_bt_xml_filename: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_recovery_and_replanning.xml
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_checker_bt_node
    - nav2_is_battery_low_condition_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker:
      plugin: nav2_controller_server::ProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: nav2_controller_server::GoalChecker
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: True
      min_vel_x: 0.0
      max_vel_x: 0.5
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      max_speed_theta: 1.0
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 40
      sim_time: 1.7
      sim_granularity: 0.05
      horizon: 10.0
      costtrajectory:
        critical_cost: 88.72
        cost_factor: 1.0
        footprint_cost: 1.0
        neutralize_offset: True
        publish_cost_grid_pc: True
        size_x: 48
        size_y: 48
      global_frame_id: odom

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.5
      plugins:
        - name: obstacle_layer
          plugin: nav2_costmap_2d::ObstacleLayer
          enabled: True
          observation_sources: scan
          scan:
            sensor_type: sensor_msgs/msg/LaserScan
            topic: /scan
            marking: True
            clearing: True
            min_obstacle_height: 0.0
            max_obstacle_height: 2.0
        - name: inflation_layer
          plugin: nav2_costmap_2d::InflationLayer
          enabled: True
          cost_scaling_factor: 1.0
          inflation_radius: 0.55

local_costmap_client:
  local_costmap_client:
    ros__parameters:
      use_sim_time: false

local_costmap_rclcpp_node:
  ros__parameters:
    use_sim_time: false

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.5
      resolution: 0.05
      plugins:
        - name: obstacle_layer
          plugin: nav2_costmap_2d::ObstacleLayer
          enabled: True
          observation_sources: scan
          scan:
            sensor_type: sensor_msgs/msg/LaserScan
            topic: /scan
            marking: True
            clearing: True
            min_obstacle_height: 0.0
            max_obstacle_height: 2.0
        - name: inflation_layer
          plugin: nav2_costmap_2d::InflationLayer
          enabled: True
          cost_scaling_factor: 1.0
          inflation_radius: 0.55

global_costmap_client:
  global_costmap_client:
    ros__parameters:
      use_sim_time: false

global_costmap_rclcpp_node:
  ros__parameters:
    use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "g60pro_sim_map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5000
    free_thresh_default: 0.25
    occupancy_thresh_default: 0.65
    map_name: g60pro_map

nav2_bt_navigator:
  ros__parameters:
    use_sim_time: false

nav2_controller_server:
  ros__parameters:
    use_sim_time: false

nav2_navigator:
  ros__parameters:
    use_sim_time: false
    bt_xml_filename: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_recovery_and_replanning.xml
    plugin_lib_names:
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_goal_checker_bt_node
    - nav2_navigate_through_poses_action_bt_node
    - nav2_navigate_to_pose_action_bt_node

nav2_planner:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ['grid_global']
    grid_global:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    controller_frequency: 20.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: nav2_recoveries::Spin
    backup:
      plugin: nav2_recoveries::BackUp
    wait:
      plugin: nav2_recoveries::Wait

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

robot_localization:
  ros__parameters:
    use_sim_time: false