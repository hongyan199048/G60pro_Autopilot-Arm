controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05    # 5cm 位置容差（充电对接精度要求）
      yaw_goal_tolerance: 0.13   # 7.5° 角度容差（0.13 rad，充电对接精度要求）
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.3   # 允许倒车，匹配 SmacPlannerHybrid 的倒退路径
      min_vel_y: 0.0
      max_vel_x: 0.3    # 实车初期保守速度，稳定后可提高到 0.5
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 1.0    # 实车加速度保守值
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      vx_samples: 20
      vy_samples: 0
      vtheta_samples: 40        # 增加角速度采样，提高转向平滑度
      sim_time: 4.0             # 增大预测时间（原 2.5），提前看到终点
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      # DWB Critics 评分器（顺序影响行为优先级）
      # 注释掉 RotateToGoal，允许"边转边走"，避免起点/终点原地转向
      critics: ["Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.05  # 提高避障权重，更激进规避障碍物
      PathAlign.scale: 32.0     # 提高路径对齐权重，鼓励沿路径平滑转向
      PathAlign.forward_point_distance: 1.0  # 增大前瞻距离（原 0.3），提前调整方向
      GoalAlign.scale: 2.0      # 大幅降低目标对齐权重，减少终点原地转向
      GoalAlign.forward_point_distance: 0.5  # 增大目标前瞻距离（原 0.1）
      PathDist.scale: 48.0      # 提高路径距离权重，优先保持在路径附近
      GoalDist.scale: 24.0
      # RotateToGoal.scale: 32.0              # 已禁用：避免原地转向
      # RotateToGoal.slowing_factor: 5.0
      # RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: map     # Cartographer 发布 map→base_footprint，局部地图使用同一坐标系
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.5
      transform_tolerance: 1.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan single_1 single_2 camera_front camera_rear camera_left camera_right  # Helios16 + 双单线 + 4 RGBD
        # Helios16 多线雷达（主力，远距离）
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5  # 降低下限，避免边界过滤
          clearing: true  
          marking: true   
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        # 单线雷达 1（右前，近场补盲）
        single_1:
          topic: /lidar/single_1/scan
          sensor_frame: single_lidar_1_link
          max_obstacle_height: 3.0  # 提高上限，避免边界过滤（单线雷达 Z=0.486m）
          min_obstacle_height: -2.0  # 大幅降低下限到 -2.0m，确保低矮障碍物不被过滤
          clearing: true   # 启用清除
          marking: true    # 启用标记
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0  # 改为 0.0，检测所有距离的障碍物（包括紧贴车身的）
          observation_persistence: 1.0  # 增加到 1.0 秒，避免因时间戳偏移被丢弃
          expected_update_rate: 10.0  # 降低到 10Hz，避免因更新率不足被标记为过期
          inf_is_valid: false
        # 单线雷达 2（左后，近场补盲）
        single_2:
          topic: /lidar/single_2/scan
          sensor_frame: single_lidar_2_link
          max_obstacle_height: 3.0  # 提高上限，避免边界过滤（单线雷达 Z=0.486m）
          min_obstacle_height: -2.0  # 大幅降低下限到 -2.0m，确保低矮障碍物不被过滤
          clearing: true   # 启用清除
          marking: true    # 启用标记
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0  # 改为 0.0，检测所有距离的障碍物（包括紧贴车身的）
          observation_persistence: 1.0  # 增加到 1.0 秒，避免因时间戳偏移被丢弃
          expected_update_rate: 10.0  # 降低到 10Hz，避免因更新率不足被标记为过期
          inf_is_valid: false
        # RGBD 相机 1（车头，近场盲区补盲）
        camera_front:
          topic: /camera_front/depth/scan
          sensor_frame: camera_front_link
          max_obstacle_height: 2.0
          min_obstacle_height: -1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.3
          observation_persistence: 0.5
          expected_update_rate: 10.0
          inf_is_valid: false
        # RGBD 相机 2（车尾，近场盲区补盲）
        camera_rear:
          topic: /camera_rear/depth/scan
          sensor_frame: camera_rear_link
          max_obstacle_height: 2.0
          min_obstacle_height: -1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.3
          observation_persistence: 0.5
          expected_update_rate: 10.0
          inf_is_valid: false
        # RGBD 相机 3（左侧，近场盲区补盲）
        camera_left:
          topic: /camera_left/depth/scan
          sensor_frame: camera_left_link
          max_obstacle_height: 2.0
          min_obstacle_height: -1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.3
          observation_persistence: 0.5
          expected_update_rate: 10.0
          inf_is_valid: false
        # RGBD 相机 4（右侧，近场盲区补盲）
        camera_right:
          topic: /camera_right/depth/scan
          sensor_frame: camera_right_link
          max_obstacle_height: 2.0
          min_obstacle_height: -1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.3
          observation_persistence: 0.5
          expected_update_rate: 10.0
          inf_is_valid: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 4.0
        inflation_radius: 1.0
      always_send_full_costmap: true

