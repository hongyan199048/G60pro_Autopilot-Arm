/**:
  ros__parameters:
    # 轮子参数
    wheel_radius: 0.15      # 轮子半径 (m)
    wheelbase_x: 0.61       # 前后半轮距 (m) — 完整轮距 1.22m
    wheelbase_y: 0.2705     # 左右半轮距 (m) — 完整轮距 0.541m

    # 速度限制
    max_velocity: 1.0       # 最大线速度 (m/s)
    max_angular: 1.0        # 最大角速度 (rad/s)

    # 坐标系
    base_frame: 'base_footprint'

    # 模式
    use_sim: false
    publish_tf: false       # 不发布 odom→base_footprint TF
                           # Cartographer 直接发布 map→base_footprint，odom frame 不出现在 TF 树中